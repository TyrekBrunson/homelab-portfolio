    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; max-width: 850px; margin: auto; }
        .header { text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 30px; padding-bottom: 10px; }

        .options { display: flex; flex-direction: column; gap: 8px; }
        .option { padding: 12px; border: 1px solid #e2e8f0; border-radius: 5px; cursor: pointer; display: flex; align-items: center; }
        .option:hover { background-color: #f1f5f9; }
        input { margin-right: 12px; transform: scale(1.2); }
        #submit-btn { display: block; width: 100%; padding: 20px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.2rem; cursor: pointer; margin: 40px 0; }
        #results { margin-top: 30px; padding: 25px; border-radius: 8px; display: none; border: 2px solid #cbd5e1; }
        .correct { color: #16a34a; font-weight: bold; margin-top: 10px; display: block; }
        .incorrect { color: #dc2626; font-weight: bold; margin-top: 10px; display: block; }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        examData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            let optionsHTML = '';
            item.options.forEach((opt, i) => {
                const type = item.multi ? 'checkbox' : 'radio';
                optionsHTML += `<label class="option"><input type="${type}" name="q${index}" value="${i}">${opt}</label>`;
            });
            card.innerHTML = `<div class="question-text">${item.id}. ${item.q}</div><div class="options">${optionsHTML}</div><div id="fb-${index}"></div>`;
            container.appendChild(card);
        });
    }

    function gradeExam() {
        let score = 0;
        examData.forEach((item, index) => {
            const selected = Array.from(document.querySelectorAll(`input[name="q${index}"]:checked`)).map(el => parseInt(el.value));
            const isCorrect = JSON.stringify(selected.sort()) === JSON.stringify(item.ans.sort());
            const fb = document.getElementById(`fb-${index}`);
            if (isCorrect) { score++; fb.innerHTML = `<span class="correct">Correct</span>`; }
            else { 
                const correctNames = item.ans.map(i => item.options[i]).join(", ");
                fb.innerHTML = `<span class="incorrect">Incorrect</span><div class="ans-key">Correct: ${correctNames}</div>`; 
            }
        });
        const pct = Math.round((score / examData.length) * 100);
        document.getElementById('results').style.display = 'block';
        document.getElementById('score-text').innerHTML = `Score: ${score} / ${examData.length} (${pct}%)`;
        let msg = "";
        if (pct >= 90) msg = "You're ready for the real thing! Book your exam!";
        else if (pct >= 80) msg = "Strong showing! Getting an 85% is a passing grade.";
        else if (pct >= 70) msg = "You're close! Keep working on the gaps.";
        else msg = "Use the objectives to see where you need help.";
        document.getElementById('professor-advice').innerText = msg;
        window.scrollTo(0, document.body.scrollHeight);
    }
